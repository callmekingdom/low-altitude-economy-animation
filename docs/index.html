<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青藜伴学 - AI智能学习助手</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <!-- AI学习助手 -->
        <section class="ai-assistant" id="ai-assistant">
            <div class="container">
                <div class="chat-container">
                    <!-- 顶部标题 -->
                    <div class="chat-header">
                        <div class="logo-section">
                            <!-- 青藜伴学 Logo -->
                            <svg class="logo-icon qingli-logo" viewBox="0 0 120 60" fill="none">
                                <!-- 六边形外框 -->
                                <path d="M30 5 L55 17.5 L55 42.5 L30 55 L5 42.5 L5 17.5 Z" stroke="#4A90D9" stroke-width="3" fill="none"/>
                                <!-- 内部QL字样 -->
                                <text x="18" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4A90D9">QL</text>
                                <!-- 毕业帽装饰 -->
                                <path d="M22 8 L30 3 L38 8" stroke="#4A90D9" stroke-width="2" fill="none"/>
                                <rect x="28" y="3" width="4" height="6" fill="#4A90D9"/>
                                <!-- 底部黄色装饰 -->
                                <path d="M15 48 L30 56 L45 48" stroke="#F5A623" stroke-width="2" fill="none"/>
                            </svg>
                            <div class="logo-text-section">
                                <h2 class="chat-title">青藜伴学</h2>
                                <span class="logo-subtitle">QINGLIBANXUE</span>
                            </div>
                        </div>
                        <a href="https://github.com/THU-MAIC/OpenMAIC" target="_blank" class="github-star">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                            GitHub
                        </a>
                    </div>

                    <!-- 对话区域 -->
                    <div class="chat-messages" id="chatMessages">
                        <div class="message-group">
                            <div class="user-profile">
                                <div class="avatar"><img src="assets/avatar-user.png" alt="用户" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%234A90D9%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2230%22>👤</text></svg>'"></div>
                                <span class="username">嗨，同学</span>
                            </div>
                            <div class="ai-avatars">
                                <div class="ai-avatar"><span class="ai-avatar-fallback">👨‍🏫</span></div>
                                <div class="ai-avatar"><span class="ai-avatar-fallback">👩‍🏫</span></div>
                                <button class="ai-switch-btn" title="切换AI导师">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="welcome-text">
                            <p>输入你想学的任何内容，例如：</p>
                            <div class="example-chips">
                                <button class="example-chip" onclick="fillInput('从零学 Python，30 分钟写出第一个程序')">「从零学 Python，30 分钟写出第一个程序」</button>
                                <button class="example-chip" onclick="fillInput('用白板给我讲解傅里叶变换')">「用白板给我讲解傅里叶变换」</button>
                                <button class="example-chip" onclick="fillInput('阿瓦隆桌游怎么玩')">「阿瓦隆桌游怎么玩」</button>
                            </div>
                        </div>
                    </div>

                    <!-- 输入区域 -->
                    <div class="chat-input-area">
                        <div class="input-toolbar">
                            <button class="tool-btn" title="上传附件">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
                            </button>
                            <button class="tool-btn" title="画板">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34a.996.996 0 0 0-1.41 0L9 12.25 11.75 15l8.96-8.96a.996.996 0 0 0 0-1.41z"/></svg>
                            </button>
                            <button class="tool-btn language-btn" title="语言">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
                                <span>中文</span>
                            </button>
                        </div>
                        
                        <div class="input-wrapper">
                            <textarea 
                                id="chatInput" 
                                class="chat-input" 
                                placeholder="输入你想解答的题目或问题..."
                                rows="1"
                            ></textarea>
                            <button class="voice-btn" title="语音输入">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                            </button>
                            <button class="send-btn" id="sendBtn" title="进入课堂">
                                <span>进入课堂</span>
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // AI Assistant - Chat Input Auto-resize
        const chatInput = document.getElementById('chatInput');
        if (chatInput) {
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
        
        // AI Assistant - Send Button
        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) {
            sendBtn.addEventListener('click', sendMessage);
        }
        
        // Global function to fill input from example chips
        function fillInput(text) {
            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.value = text;
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
                chatInput.focus();
            }
        }
        
        // Send message function
        function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const chatMessages = document.getElementById('chatMessages');
            
            if (!chatInput || !chatMessages) return;
            
            const message = chatInput.value.trim();
            if (!message) return;
            
            // Hide welcome text
            const welcomeText = chatMessages.querySelector('.welcome-text');
            if (welcomeText) {
                welcomeText.style.display = 'none';
            }
            
            // Add user message
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'user-message';
            userMsgDiv.innerHTML = `
                <div class="message-bubble user-bubble">
                    <p>${escapeHtml(message)}</p>
                </div>
            `;
            chatMessages.appendChild(userMsgDiv);
            
            // Clear input
            chatInput.value = '';
            chatInput.style.height = 'auto';
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // Simulate AI response
            setTimeout(() => {
                const aiMsgDiv = document.createElement('div');
                aiMsgDiv.className = 'ai-message';
                aiMsgDiv.innerHTML = `
                    <div class="message-avatar">👨‍🏫</div>
                    <div class="message-bubble ai-bubble">
                        <p>正在思考中...</p>
                    </div>
                `;
                chatMessages.appendChild(aiMsgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // Update response after delay
                setTimeout(() => {
                    aiMsgDiv.querySelector('p').textContent = '这是一个模拟回复。实际使用时，这里会连接AI后端生成解答过程。';
                }, 1500);
            }, 500);
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
