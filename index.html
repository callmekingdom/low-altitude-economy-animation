<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青藜伴学 - AI智能学习助手</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <!-- AI学习助手 -->
        <section class="ai-assistant" id="ai-assistant">
            <div class="container">
                <div class="chat-container">
                    <!-- 顶部标题 -->
                    <div class="chat-header">
                        <div class="logo-section">
                            <!-- 青藜伴学 Logo -->
                            <svg class="logo-icon qingli-logo" viewBox="0 0 120 60" fill="none">
                                <!-- 六边形外框 -->
                                <path d="M30 5 L55 17.5 L55 42.5 L30 55 L5 42.5 L5 17.5 Z" stroke="#4A90D9" stroke-width="3" fill="none"/>
                                <!-- 内部QL字样 -->
                                <text x="18" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4A90D9">QL</text>
                                <!-- 毕业帽装饰 -->
                                <path d="M22 8 L30 3 L38 8" stroke="#4A90D9" stroke-width="2" fill="none"/>
                                <rect x="28" y="3" width="4" height="6" fill="#4A90D9"/>
                                <!-- 底部黄色装饰 -->
                                <path d="M15 48 L30 56 L45 48" stroke="#F5A623" stroke-width="2" fill="none"/>
                            </svg>
                            <div class="logo-text-section">
                                <h2 class="chat-title">青藜伴学</h2>
                                <span class="logo-subtitle">QINGLIBANXUE</span>
                            </div>
                        </div>
                        <a href="https://github.com/THU-MAIC/OpenMAIC" target="_blank" class="github-star">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                            GitHub
                        </a>
                    </div>

                    <!-- 对话区域 -->
                    <div class="chat-messages" id="chatMessages">
                        <!-- API Key 设置提示 -->
                        <div class="api-key-setup" id="apiKeySetup">
                            <div class="setup-icon">🔑</div>
                            <h3>首次使用请设置 API Key</h3>
                            <p>前往 <a href="https://dashscope.console.aliyun.com/" target="_blank">阿里云 DashScope 平台</a> 免费获取</p>
                            <div class="api-key-input-group">
                                <input type="password" id="apiKeyInput" placeholder="输入你的 通义千问 API Key..." />
                                <button id="saveApiKeyBtn" class="save-key-btn">保存</button>
                            </div>
                            <p class="setup-hint">API Key 仅保存在你的浏览器本地，不会上传到任何服务器</p>
                            <a href="#" onclick="clearCache(); return false;" class="clear-cache-link">↻ 清除缓存重新加载</a>
                        </div>

                        <div class="message-group" style="display: none;" id="messageGroup">
                            <div class="user-profile">
                                <div class="avatar"><img src="assets/avatar-user.png" alt="用户" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%234A90D9%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2230%22>👤</text></svg>'"></div>
                                <span class="username">嗨，同学</span>
                            </div>
                            <div class="ai-avatars">
                                <div class="ai-avatar"><span class="ai-avatar-fallback">👨‍🏫</span></div>
                                <div class="ai-avatar"><span class="ai-avatar-fallback">👩‍🏫</span></div>
                                <button class="ai-switch-btn" title="切换AI导师">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                                </button>
                            </div>
                        </div>
                        
                        <!-- 重置 API Key 按钮 -->
                        <button id="resetApiKeyBtn" class="reset-key-btn" style="display: none;">🔑 重置通义千问 API Key</button>
                        
                        <div class="welcome-text">
                            <p>输入你想学的任何内容，例如：</p>
                            <div class="example-chips">
                                <button class="example-chip" onclick="fillInput('从零学 Python，30 分钟写出第一个程序')">「从零学 Python，30 分钟写出第一个程序」</button>
                                <button class="example-chip" onclick="fillInput('用白板给我讲解傅里叶变换')">「用白板给我讲解傅里叶变换」</button>
                                <button class="example-chip" onclick="fillInput('阿瓦隆桌游怎么玩')">「阿瓦隆桌游怎么玩」</button>
                            </div>
                        </div>
                    </div>

                    <!-- 输入区域 -->
                    <div class="chat-input-area">
                        <div class="input-toolbar">
                            <button class="tool-btn" title="上传附件">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
                            </button>
                            <button class="tool-btn" title="画板">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34a.996.996 0 0 0-1.41 0L9 12.25 11.75 15l8.96-8.96a.996.996 0 0 0 0-1.41z"/></svg>
                            </button>
                            <button class="tool-btn language-btn" title="语言">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
                                <span>中文</span>
                            </button>
                        </div>
                        
                        <div class="input-wrapper">
                            <textarea 
                                id="chatInput" 
                                class="chat-input" 
                                placeholder="输入你想解答的题目或问题..."
                                rows="1"
                            ></textarea>
                            <button class="voice-btn" title="语音输入">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                            </button>
                            <button class="send-btn" id="sendBtn" title="进入课堂">
                                <span>进入课堂</span>
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // ===== 强制清除缓存（开发调试用，可删除）=====
        // localStorage.removeItem('qwen_api_key');
        // ============================================
        
        // 通义千问 API Configuration (inline for initial load)
        const QWEN_CONFIG = {
            apiKey: localStorage.getItem('qwen_api_key') || '',
            baseUrl: 'https://dashscope.aliyuncs.com/api/v1',
            model: 'qwen-max',
            temperature: 0.7,
            max_tokens: 4096
        };

        // Check if API key exists on load
        document.addEventListener('DOMContentLoaded', function() {
            const apiKeySetup = document.getElementById('apiKeySetup');
            const messageGroup = document.getElementById('messageGroup');
            const welcomeText = document.querySelector('.welcome-text');
            const resetBtn = document.getElementById('resetApiKeyBtn');
            
            console.log('API Key exists:', !!QWEN_CONFIG.apiKey);
            
            if (QWEN_CONFIG.apiKey) {
                apiKeySetup.style.display = 'none';
                messageGroup.style.display = 'flex';
                welcomeText.style.display = 'block';
                if (resetBtn) resetBtn.style.display = 'block';
            } else {
                apiKeySetup.style.display = 'block';
                messageGroup.style.display = 'none';
                welcomeText.style.display = 'none';
                if (resetBtn) resetBtn.style.display = 'none';
            }
        });

        // Reset API Key
        const resetBtn = document.getElementById('resetApiKeyBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', function() {
                if (confirm('确定要清除 API Key 吗？清除后需要重新设置。')) {
                    localStorage.removeItem('qwen_api_key');
                    QWEN_CONFIG.apiKey = '';
                    location.reload();
                }
            });
        }

        // Save API Key
        document.getElementById('saveApiKeyBtn').addEventListener('click', function() {
            const keyInput = document.getElementById('apiKeyInput');
            const key = keyInput.value.trim();
            
            if (!key) {
                alert('请输入 API Key');
                return;
            }
            
            if (!key.startsWith('sk-')) {
                alert('API Key 格式不正确，应以 sk- 开头（阿里云DashScope格式）');
                return;
            }
            
            QWEN_CONFIG.apiKey = key;
            localStorage.setItem('qwen_api_key', key);
            
            // Show success and switch to chat
            document.getElementById('apiKeySetup').innerHTML = `
                <div class="setup-icon" style="font-size: 48px;">✅</div>
                <h3>设置成功！</h3>
                <p>现在可以开始使用 通义千问 解析题目了</p>
            `;
            
            setTimeout(() => {
                document.getElementById('apiKeySetup').style.display = 'none';
                document.getElementById('messageGroup').style.display = 'flex';
                document.querySelector('.welcome-text').style.display = 'block';
            }, 1500);
        });

        // Allow Enter key to save
        document.getElementById('apiKeyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('saveApiKeyBtn').click();
            }
        });

        window.setQwenApiKey = function(key) {
            QWEN_CONFIG.apiKey = key;
            localStorage.setItem('qwen_api_key', key);
            console.log('通义千问 API Key 已设置');
        };

        // 清除缓存函数
        window.clearCache = function() {
            localStorage.removeItem('qwen_api_key');
            alert('缓存已清除，页面将重新加载');
            location.reload();
        };

        // AI Assistant - Chat Input Auto-resize
        const chatInput = document.getElementById('chatInput');
        if (chatInput) {
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
        
        // AI Assistant - Send Button
        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) {
            sendBtn.addEventListener('click', sendMessage);
        }
        
        // Global function to fill input from example chips
        function fillInput(text) {
            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.value = text;
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
                chatInput.focus();
            }
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Simple Markdown Parser
        function parseMarkdown(text) {
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
            text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            text = text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            text = text.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            text = text.replace(/^\- (.*$)/gim, '<li>$1</li>');
            text = text.replace(/(\n)/g, '<br>');
            return text;
        }

        // Call 通义千问 API with streaming
        async function callQwenAPI(message, onChunk, onComplete, onError) {
            if (!QWEN_CONFIG.apiKey) {
                onError('请先设置 通义千问 API Key。在控制台输入: setQwenApiKey("your-api-key")');
                return;
            }

            const systemPrompt = `你是「青藜伴学」的AI学习助手，一位耐心、专业的导师。

你的职责是：
1. 详细解析用户提出的题目或问题
2. 给出清晰的解题思路和步骤
3. 如果是数学题，展示完整的推导过程
4. 如果是概念性问题，用通俗易懂的语言解释
5. 适当使用例子帮助理解
6. 鼓励学生思考，而不是直接给答案

请用中文回答，格式清晰，重点突出。`;

            try {
                const response = await fetch(`${QWEN_CONFIG.baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${QWEN_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: QWEN_CONFIG.model,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: message }
                        ],
                        temperature: QWEN_CONFIG.temperature,
                        max_tokens: QWEN_CONFIG.max_tokens,
                        stream: true
                    })
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error?.message || `HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.trim() === '' || line.trim() === 'data: [DONE]') continue;
                        
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices?.[0]?.delta?.content;
                                if (content) {
                                    fullText += content;
                                    onChunk(fullText);
                                }
                            } catch (e) {}
                        }
                    }
                }

                onComplete(fullText);
            } catch (error) {
                onError(error.message);
            }
        }
        
        // Send message function
        async function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const chatMessages = document.getElementById('chatMessages');
            
            if (!chatInput || !chatMessages) return;
            
            const message = chatInput.value.trim();
            if (!message) return;
            
            // Check if API key is set
            if (!QWEN_CONFIG.apiKey) {
                alert('请先设置 通义千问 API Key');
                document.getElementById('apiKeyInput').focus();
                return;
            }
            
            // Hide welcome text
            const welcomeText = chatMessages.querySelector('.welcome-text');
            if (welcomeText) {
                welcomeText.style.display = 'none';
            }
            
            // Add user message
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'user-message';
            userMsgDiv.innerHTML = `
                <div class="message-bubble user-bubble">
                    <p>${escapeHtml(message)}</p>
                </div>
            `;
            chatMessages.appendChild(userMsgDiv);
            
            // Clear input
            chatInput.value = '';
            chatInput.style.height = 'auto';
            
            // Add AI response container
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'ai-message';
            aiMsgDiv.innerHTML = `
                <div class="message-avatar">👨‍🏫</div>
                <div class="message-bubble ai-bubble">
                    <div class="thinking-indicator">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="response-content" style="display: none;"></div>
                </div>
            `;
            chatMessages.appendChild(aiMsgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            const responseContent = aiMsgDiv.querySelector('.response-content');
            const thinkingIndicator = aiMsgDiv.querySelector('.thinking-indicator');
            
            // Call 通义千问 API
            await callQwenAPI(
                message,
                (chunk) => {
                    thinkingIndicator.style.display = 'none';
                    responseContent.style.display = 'block';
                    responseContent.innerHTML = parseMarkdown(chunk);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                },
                (fullText) => {
                    thinkingIndicator.style.display = 'none';
                    responseContent.style.display = 'block';
                    responseContent.innerHTML = parseMarkdown(fullText);
                },
                (error) => {
                    thinkingIndicator.style.display = 'none';
                    responseContent.style.display = 'block';
                    responseContent.innerHTML = `<div style="color: #dc2626;">
                        <strong>出错了</strong><br>
                        ${escapeHtml(error)}
                    </div>`;
                }
            );
        }
    </script>
</body>
</html>
