<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 左侧六边形图标 -->
  <g transform="translate(15, 10)">
    <!-- 六边形外框 -->
    <polygon points="45,5 80,25 80,65 45,85 10,65 10,25" 
             fill="none" 
             stroke="url(#blueGrad)" 
             stroke-width="4"
             filter="url(#glow)"/>
    
    <!-- 内部六边形 -->
    <polygon points="45,15 70,30 70,60 45,75 20,60 20,30" 
             fill="rgba(14, 165, 233, 0.1)"/>
    
    <!-- Q字母 -->
    <text x="32" y="52" 
          font-family="Arial, sans-serif" 
          font-size="28" 
          font-weight="bold" 
          fill="url(#blueGrad)"
          filter="url(#glow)">Q</text>
    
    <!-- L字母 -->
    <text x="50" y="52" 
          font-family="Arial, sans-serif" 
          font-size="28" 
          font-weight="bold" 
          fill="url(#orangeGrad)">L</text>
    
    <!-- 底部橙色装饰 -->
    <polygon points="35,75 45,82 55,75 55,68 45,75 35,68" 
             fill="url(#orangeGrad)"/>
  </g>
  
  <!-- 中文名称 -->
  <text x="115" y="55" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="42" 
        font-weight="bold" 
        fill="url(#blueGrad)"
        filter="url(#glow)">青藜伴学</text>
  
  <!-- 拼音 -->
  <text x="118" y="85" 
        font-family="'Inter', Arial, sans-serif" 
        font-size="14" 
        font-weight="500" 
        fill="#64748b"
        letter-spacing="3">QINGLIBANXUE</text>
  
  <!-- 装饰线条 -->
  <line x1="115" y1="92" x2="320" y2="92" 
        stroke="url(#blueGrad)" 
        stroke-width="1.5" 
        opacity="0.5"/>
</svg>